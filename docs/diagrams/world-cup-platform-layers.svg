<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 780" width="1280" height="780">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="1280" height="780" fill="#ffffff"/>
  <text x="640.0" y="48" text-anchor="middle" fill="#111827" font-size="24" font-weight="800">
<tspan x="640.0" dy="0">世界杯工作台：大体分层思路</tspan>
</text>
  <g>
<rect x="270" y="110" width="740" height="78" rx="18" ry="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6"/>
<text x="640.0" y="144" text-anchor="middle" fill="#111827" font-size="18" font-weight="700">
<tspan x="640.0" dy="0">用户入口层</tspan>
</text>
<text x="640.0" y="174" text-anchor="middle" fill="#6b7280" font-size="13" font-weight="400">
<tspan x="640.0" dy="0">选择比赛、看选题、点生成</tspan>
</text>
</g>
  <g>
<rect x="270" y="210" width="740" height="78" rx="18" ry="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6"/>
<text x="640.0" y="244" text-anchor="middle" fill="#111827" font-size="18" font-weight="700">
<tspan x="640.0" dy="0">热点判断层</tspan>
</text>
<text x="640.0" y="274" text-anchor="middle" fill="#6b7280" font-size="13" font-weight="400">
<tspan x="640.0" dy="0">看赛程、找素材、判断这场有没有话题</tspan>
</text>
</g>
  <g>
<rect x="270" y="310" width="740" height="78" rx="18" ry="18" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.6"/>
<text x="640.0" y="344" text-anchor="middle" fill="#111827" font-size="18" font-weight="700">
<tspan x="640.0" dy="0">内容创作层</tspan>
</text>
<text x="640.0" y="374" text-anchor="middle" fill="#6b7280" font-size="13" font-weight="400">
<tspan x="640.0" dy="0">学习对标账号，写选题、旁白和脚本</tspan>
</text>
</g>
  <g>
<rect x="270" y="410" width="740" height="78" rx="18" ry="18" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6"/>
<text x="640.0" y="444" text-anchor="middle" fill="#111827" font-size="18" font-weight="700">
<tspan x="640.0" dy="0">剪辑生产层</tspan>
</text>
<text x="640.0" y="474" text-anchor="middle" fill="#6b7280" font-size="13" font-weight="400">
<tspan x="640.0" dy="0">准备素材，生成剪映草稿、配音、字幕、BGM</tspan>
</text>
</g>
  <g>
<rect x="270" y="510" width="740" height="78" rx="18" ry="18" fill="#fef2f2" stroke="#fecaca" stroke-width="1.6"/>
<text x="640.0" y="544" text-anchor="middle" fill="#111827" font-size="18" font-weight="700">
<tspan x="640.0" dy="0">质量检查层</tspan>
</text>
<text x="640.0" y="574" text-anchor="middle" fill="#6b7280" font-size="13" font-weight="400">
<tspan x="640.0" dy="0">检查文案、画面、声音、字幕是否能发</tspan>
</text>
</g>
  <g>
<rect x="270" y="610" width="740" height="78" rx="18" ry="18" fill="#f0fdfa" stroke="#ccfbf1" stroke-width="1.6"/>
<text x="640.0" y="644" text-anchor="middle" fill="#111827" font-size="18" font-weight="700">
<tspan x="640.0" dy="0">发布包装层</tspan>
</text>
<text x="640.0" y="674" text-anchor="middle" fill="#6b7280" font-size="13" font-weight="400">
<tspan x="640.0" dy="0">生成小红书文案、封面图和下载文件</tspan>
</text>
</g>
  <line x1="640.0" y1="196" x2="640.0" y2="200" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="640.0" y1="296" x2="640.0" y2="300" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="640.0" y1="396" x2="640.0" y2="400" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="640.0" y1="496" x2="640.0" y2="500" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="640.0" y1="596" x2="640.0" y2="600" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 230 550 C 110 550 110 350 230 350" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="7,5" marker-end="url(#arrow-blue)"/>
  <text x="126" y="448" text-anchor="start" fill="#6b7280" font-size="13" font-weight="400">
<tspan x="126" dy="0">不够好就回到创作层重来</tspan>
</text>
  <text x="640.0" y="725" text-anchor="middle" fill="#6b7280" font-size="16" font-weight="600">
<tspan x="640.0" dy="0">一句话：平台帮你把“比赛”变成“能发布的视频资产”。</tspan>
</text>
</svg>
